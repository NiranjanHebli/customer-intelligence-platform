name: Customer Intelligence Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Check Commit Message Format
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git log --format=%s origin/${{ github.base_ref }}..HEAD | while read -r commit_msg; do
            if ! echo "$commit_msg" | grep -Eq "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$"; then
              echo "ERROR: Invalid commit message: '$commit_msg'"
              echo "Must follow Conventional Commits format, e.g., 'feat(auth): add login'"
              exit 1
            fi
          done
        else
          commit_msg=$(git log -1 --format=%s)
          if ! echo "$commit_msg" | grep -Eq "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$"; then
            echo "ERROR: Invalid commit message: '$commit_msg'"
            echo "Must follow Conventional Commits format, e.g., 'feat(auth): add login'"
            exit 1
          fi
        fi

  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest flake8

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src tests monitoring --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 src tests monitoring --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Data Validation Checks
      run: |
        # Run data pipeline verification on dummy/small validation files
        echo "Running schema validation..."
        # python src/data_pipeline/validate.py --ci

    - name: Run Model Promotion Gate Tests
      run: |
        # Run tests to check if the relative model promotion gate works
        echo "Running promotion gate test..."
        # python src/training/evaluate.py --ci

    - name: Run Unit & Integration Tests
      run: |
        pytest tests/
