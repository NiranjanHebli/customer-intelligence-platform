name: Customer Intelligence Platform CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Check Commit Message Format
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git log --format=%s origin/${{ github.base_ref }}..HEAD | while read -r commit_msg; do
            if ! echo "$commit_msg" | grep -Eq "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$"; then
              echo "ERROR: Invalid commit message: '$commit_msg'"
              echo "Must follow Conventional Commits format, e.g., 'feat(auth): add login'"
              exit 1
            fi
          done
        else
          commit_msg=$(git log -1 --format=%s)
          if ! echo "$commit_msg" | grep -Eq "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$"; then
            echo "ERROR: Invalid commit message: '$commit_msg'"
            echo "Must follow Conventional Commits format, e.g., 'feat(auth): add login'"
            exit 1
          fi
        fi

  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src tests monitoring --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 src tests monitoring --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Data Validation Checks
      run: |
        # Run data pipeline verification on tracked sample validation files
        python src/data_pipeline/validate.py --input-dir data/samples --output-dir data/processed

    - name: Download Bank Marketing Data (For ML Pipeline)
      run: |
        python src/data_pipeline/ingest.py --bank
        python src/data_pipeline/validate.py --input-dir data/raw --output-dir data/processed

    - name: Run Model Promotion Gate
      run: |
        # This will train the models and run the promotion gate
        python src/training/train.py

    - name: Setup RAG Index (For Tests)
      run: |
        # Fetch a tiny sample of CFPB complaints to quickly build the FAISS index for tests
        python src/data_pipeline/ingest.py --cfpb --sample-size 50
        python src/rag/index.py

    - name: Run Unit & Integration Tests
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        pytest tests/ -v
